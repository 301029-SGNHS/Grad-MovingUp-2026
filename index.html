<style>
:root{
    --bg1:#020617;
    --bg2:#0f172a;
    --bg3:#1e293b;
    --gold:#d4af37;
    --gold-soft:#f1e5ac;
    --white:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Montserrat',sans-serif;
    background: radial-gradient(circle at top, var(--bg3), var(--bg2), var(--bg1));
    color:var(--white);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
}

/* ⭐ GOLD STARS */
body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
        radial-gradient(var(--gold) 1px, transparent 2px),
        radial-gradient(var(--gold-soft) 1px, transparent 2px);
    background-size:120px 120px, 200px 200px;
    opacity:.25;
    animation:moveStars 80s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}

/* HEADER */
header{
    text-align:center;
    padding:50px 20px 10px;
}

header h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.6rem,5vw,2rem); /* maliit na font at responsive */
    color:var(--gold);
    white-space: normal; /* <-- dito nag-a-adapt sa screen */
    text-align: center; /* optional, para siguradong center */
    line-height:1.2;
    text-shadow:0 0 10px rgba(212,175,55,.3);
    max-width:90%; /* hindi lalampas sa container */
    margin:auto;
}

.location{
    display:block;
    margin-top:5px;
    color:var(--gold-soft);
    letter-spacing:2px;
    font-size:.9rem;
}

/* THEME BOX */
.theme-box{
    margin-top:25px;
    display:inline-block;
    padding:15px 25px;
    border:1px solid rgba(212,175,55,.5);
    border-radius:12px;
    background:rgba(0,0,0,.25);
    box-shadow:0 0 15px rgba(212,175,55,.15);
}

.theme-text{
    font-style:italic;
    font-size:.95rem;
}

.gold-accent{
    color:var(--gold);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
    padding:40px;
    max-width:1200px;
    margin:auto;
}

/* CARD */
.card{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;
    text-decoration:none;
}

/* IMAGE */
.card img{
    width:100%;
    height:190px;
    object-fit:cover;
    transition:.5s;
}

/* DARK OVERLAY */
.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
    z-index:1;
}

/* ✨ STAR SHIMMER */
.card::after{
    content:'✦ ✧ ✦';
    position:absolute;
    top:10px;
    right:12px;
    font-size:.7rem;
    color:var(--gold-soft);
    letter-spacing:3px;
    animation:twinkle 2.5s infinite;
    z-index:2;
}

@keyframes twinkle{
    0%,100%{opacity:.3;}
    50%{opacity:1;}
}

/* 🔥 TITLE (FIXED READABILITY) */
.title{
    position:absolute;
    bottom:12px;
    left:12px;
    z-index:2;

    background:linear-gradient(to top, rgba(0,0,0,.8), rgba(0,0,0,.4));
    backdrop-filter:blur(6px);
    padding:8px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
}

.title span{
    font-size:.65rem;
    letter-spacing:2px;
    color:#ffffff;
    opacity:.9;
    text-shadow:0 1px 3px rgba(0,0,0,.8);
}

.title h2{
    font-family:'Playfair Display',serif;
    font-size:1rem;
    color:#ffffff;
    text-shadow:0 2px 6px rgba(0,0,0,.9);
}

/* HOVER */
.card:hover{
    transform:translateY(-8px) scale(1.02);
}

.card:hover img{
    transform:scale(1.08);
}

/* 🌈 GLOW */
.card:nth-child(4n+1):hover{box-shadow:0 0 25px rgba(59,130,246,.6);}
.card:nth-child(4n+2):hover{box-shadow:0 0 25px rgba(34,197,94,.6);}
.card:nth-child(4n+3):hover{box-shadow:0 0 25px rgba(245,158,11,.6);}
.card:nth-child(4n+4):hover{box-shadow:0 0 25px rgba(239,68,68,.6);}

/* FOOTER */
.footer{
    text-align:center;
    padding:30px;
    opacity:.6;
    font-size:.85rem;
}

/* MOBILE */
@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>
